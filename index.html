<!DOCTYPE html>
<html>
<head>
<title>Skill To Career Map</title>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
padding:0;

background:linear-gradient(135deg,#0f172a,#2563eb,#9333ea);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

.container{

width:90%;
max-width:900px;

padding:30px;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(15px);

border-radius:20px;

color:white;

box-shadow:0px 0px 20px rgba(0,0,0,0.4);

text-align:center;

}

input{

width:70%;
padding:15px;

border-radius:10px;
border:none;

font-size:16px;

}

button{

padding:15px 20px;

border:none;
border-radius:10px;

cursor:pointer;

font-size:16px;

}

.result{

margin-top:20px;

padding:20px;

background:rgba(255,255,255,0.2);

border-radius:15px;

text-align:left;

}

</style>
</head>

<body>

<div class="container">

<h1>🚀 Skill To Career Map</h1>

<p>Search: coding, gaming, science, art</p>

<input
id="interest"
placeholder="Enter interest">

<button onclick="findCareer()">
Search
</button>

<div class="result"
id="output">

Enter something to begin

</div>

</div>

<script>

function findCareer(){

let interest=document
.getElementById("interest")
.value.toLowerCase();

let result="";

if(interest.includes("coding")){

result=`

<h2>💻 Software Developer</h2>

<h3>Description</h3>

<p>
Software developers create websites,
mobile apps and software solutions.
</p>

<h3>Skills Required</h3>

<p>
HTML, CSS, JavaScript,
Problem Solving,
React
</p>

<h3>Roadmap</h3>

<p>

1. Learn HTML<br>
2. Learn CSS<br>
3. Learn JavaScript<br>
4. Build projects<br>
5. Learn React<br>
6. Build portfolio<br>
7. Apply for internships

</p>

<h3>Courses</h3>

<p>

• FreeCodeCamp Web Development<br>
• CS50 Introduction<br>
• JavaScript Beginner Course

</p>

<h3>Salary</h3>

<p>

Beginner:
₹3–8 lakh/year

</p>

`;
}

else if(interest.includes("science")){

result=`

<h2>🔬 Scientist</h2>

<h3>Description</h3>

<p>
Scientists study nature and discover
new knowledge.
</p>

<h3>Skills Required</h3>

<p>
Research, analysis,
critical thinking
</p>

<h3>Roadmap</h3>

<p>

1. Strong science basics<br>
2. Degree in science<br>
3. Research projects<br>
4. Advanced studies

</p>

<h3>Courses</h3>

<p>

• Basic Physics<br>
• Chemistry Fundamentals<br>
• Research Methods

</p>

`;

}

else{

result=`

<h2>No result found</h2>

<p>
Try:
coding, science, gaming, art
</p>

`;

}

document.getElementById("output")
.innerHTML=result;

}

</script>

</body>
</html>
